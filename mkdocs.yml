site_name: MaestroTheme
site_url: https://rmkohlman.github.io/MaestroTheme/
site_description: Neovim theme management engine for the DevOpsMaestro toolkit
site_author: Robert Kohlman
repo_name: rmkohlman/MaestroTheme
repo_url: https://github.com/rmkohlman/MaestroTheme

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rmkohlman/MaestroTheme

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Themes:
    - Overview: themes/overview.md
    - Theme Library: themes/library.md
    - CoolNight Collection: themes/coolnight.md
    - Parametric Generator: themes/parametric.md
  - Configuration:
    - Theme Hierarchy: configuration/theme-hierarchy.md
    - Supported Colorscheme Plugins: configuration/supported-plugins.md
  - Advanced:
    - Theme IaC: advanced/theme-iac.md
  - Commands Reference: commands.md
  - YAML Reference:
    - NvimTheme: reference/nvim-theme.md
